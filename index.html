<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>业务需求分析工作台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232364aa'/%3E%3Cpath d='M18 20h28v6H18zm0 13h20v6H18zm0 13h28v6H18z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css?v=20260614-filename-export" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="分析输入">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>业务需求分析工作台</h1>
            <p>面向软件咨询顾问的客户材料梳理与方案初稿生成</p>
          </div>
        </div>

        <form id="analysisForm" class="input-form">
          <label class="field">
            <span>客户名称</span>
            <input id="customerName" type="text" placeholder="例如：华东制造集团" autocomplete="organization" />
          </label>

          <label class="field">
            <span>所属行业</span>
            <select id="industry">
              <option value="制造业">制造业</option>
              <option value="零售与消费">零售与消费</option>
              <option value="金融服务">金融服务</option>
              <option value="医疗健康">医疗健康</option>
              <option value="教育培训">教育培训</option>
              <option value="政企服务">政企服务</option>
              <option value="通用企业">通用企业</option>
            </select>
          </label>

          <label class="field">
            <span>流程与制度</span>
            <textarea id="processText" rows="6" placeholder="粘贴客户当前流程、制度、审批规则、跨部门协同方式等内容"></textarea>
          </label>

          <label class="field">
            <span>调研纪要</span>
            <textarea id="interviewText" rows="7" placeholder="粘贴访谈纪要、会议结论、业务痛点、客户原话等内容"></textarea>
          </label>

          <label class="field">
            <span>补充材料</span>
            <textarea id="documentText" rows="6" placeholder="粘贴文档摘要、表格字段、邮件、SOP、系统截图说明等内容"></textarea>
          </label>

          <label class="field file-field">
            <span>批量文件</span>
            <input
              id="materials"
              type="file"
              multiple
              accept=".txt,.md,.csv,.tsv,.json,.xml,.html,.htm,.log,.sql,.yaml,.yml,.xlsx,.xls,.xlsm,.xlsb,.ods,.doc,.docx,.pdf,.ppt,.pptx,.mp3,.wav,.m4a,.aac,.png,.jpg,.jpeg"
            />
            <small>支持一次选择多个文件；会读取 Word、PDF、PPT、Excel、CSV、文本等可解析内容。</small>
          </label>

          <label class="field file-field">
            <span>文件夹</span>
            <input
              id="materialFolder"
              type="file"
              multiple
              webkitdirectory
              directory
              accept=".txt,.md,.csv,.tsv,.json,.xml,.html,.htm,.log,.sql,.yaml,.yml,.xlsx,.xls,.xlsm,.xlsb,.ods,.doc,.docx,.pdf,.ppt,.pptx,.mp3,.wav,.m4a,.aac,.png,.jpg,.jpeg"
            />
            <small>可直接上传客户资料文件夹，系统会保留子目录路径用于报告留痕。</small>
          </label>

          <div class="upload-summary" id="uploadSummary" aria-live="polite">
            <strong>未选择材料</strong>
            <span>可上传流程文件、制度文档、调研纪要、Excel 台账、录音和图片等。</span>
          </div>

          <div class="form-actions">
            <button class="primary-action" type="submit">
              <span class="button-icon" aria-hidden="true">◆</span>
              生成分析报告
            </button>
            <button class="secondary-action" type="button" id="loadSample">填入示例</button>
          </div>
        </form>
      </aside>

      <section class="workspace" aria-label="分析结果">
        <div class="topbar">
          <div>
            <p class="eyebrow">Consulting Report Builder</p>
            <h2 id="reportTitle">等待生成业务需求分析</h2>
          </div>
          <div class="toolbar">
            <button type="button" id="copyHtml" title="复制 HTML">复制 HTML</button>
            <button type="button" id="downloadHtml" title="下载 HTML 报告">下载</button>
          </div>
        </div>

        <section class="insight-strip" aria-label="关键指标">
          <div>
            <strong id="coverageScore">0%</strong>
            <span>材料完整度</span>
          </div>
          <div>
            <strong id="riskScore">-</strong>
            <span>风险等级</span>
          </div>
          <div>
            <strong id="moduleCount">0</strong>
            <span>建议模块</span>
          </div>
          <div>
            <strong id="keywordCount">0</strong>
            <span>识别关键词</span>
          </div>
        </section>

        <div class="report-layout">
          <section class="report-preview" id="reportPreview">
            <div class="empty-state">
              <div class="empty-visual" aria-hidden="true">
                <div class="node n1"></div>
                <div class="node n2"></div>
                <div class="node n3"></div>
                <div class="line l1"></div>
                <div class="line l2"></div>
              </div>
              <h3>把客户材料放进左侧，生成可交付的 HTML 初稿</h3>
              <p>报告会覆盖业务现状、业务挑战、解决思路、系统框架、功能说明与落地风险。</p>
            </div>
          </section>

          <aside class="analysis-panel" aria-label="识别线索">
            <h3>识别线索</h3>
            <div id="signalList" class="signal-list">
              <p class="muted">生成后将显示流程、协同、数据、审批、集成等信号。</p>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./vendor/xlsx.full.min.js"></script>
    <script src="./vendor/mammoth.browser.min.js"></script>
    <script src="./vendor/jszip.min.js"></script>
    <script src="./vendor/pdf.min.js"></script>
    <script src="./app.js?v=20260614-filename-export"></script>
  </body>
</html>
